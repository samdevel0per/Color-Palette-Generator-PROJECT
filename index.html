<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<h1>Color Palette Generator</h1>

<button id="generate-btn">
<i class="fas fa-sync-alt"></i>
Generate Palette
</button>

<div class="palette-container">

<div class="color-box">
<div class="color" style="background-color: #446777;"></div>
<div class="color-info">
<span class="hex-value">#446777</span>
<i class="fas fa-copy copy-btn" title="Copy to clipboard"></i>
</div>
</div>

<div class="color-box">
<div class="color" style="background-color: #084547;"></div>
<div class="color-info">
<span class="hex-value">#446777</span>
<i class="fas fa-copy copy-btn" title="Copy to clipboard"></i>
</div>
</div>

<div class="color-box">
<div class="color" style="background-color: #569cbd;"></div>
<div class="color-info">
<span class="hex-value">#446777</span>
<i class="fas fa-copy copy-btn" title="Copy to clipboard"></i>
</div>
</div>

<div class="color-box">
<div class="color" style="background-color: #ccdae0;"></div>
<div class="color-info">
<span class="hex-value">#446777</span>
<i class="fas fa-copy copy-btn" title="Copy to clipboard"></i>
</div>
</div>

<div class="color-box">
<div class="color" style="background-color: #255268;"></div>
<div class="color-info">
<span class="hex-value">#446777</span>
<i class="fas fa-copy copy-btn" title="Copy to clipboard"></i>
</div>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
